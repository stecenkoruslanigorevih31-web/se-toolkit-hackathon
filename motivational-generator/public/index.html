<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мотивационный Генератор</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🚀 Генератор Мотивации</h1>
      <p class="subtitle">Нажмите кнопку и получите вдохновение на день</p>
      
      <div id="motivation-box" class="motivation-box">
        <p id="motivation-text">Нажмите кнопку, чтобы получить мотивационный текст...</p>
      </div>
      
      <button id="generate-btn" class="btn" onclick="generateMotivation()">
        Получить Мотивацию ✨
      </button>
      
      <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Генерируем мотивацию...</p>
      </div>
      
      <div id="error-msg" class="error-msg" style="display: none;"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
